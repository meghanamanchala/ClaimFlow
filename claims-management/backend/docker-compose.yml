services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claimflow-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: claimflow-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped
