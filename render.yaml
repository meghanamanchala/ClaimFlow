services:
  - type: web
    name: claimflow-backend
    env: python
    rootDir: claims-management/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: WEB_CONCURRENCY
        value: 1
